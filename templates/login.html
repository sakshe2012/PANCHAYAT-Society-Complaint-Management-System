{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <h2 style="margin-bottom: 1.5rem; text-align: center; color: var(--primary-color);">Welcome Back</h2>
    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-full">Login</button>
    </form>
    <p style="margin-top: 1.5rem; text-align: center; color: var(--text-muted);">
        Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--primary-color);">Register</a>
    </p>
</div>
{% endblock %}
