{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <h2 style="margin-bottom: 1.5rem; text-align: center; color: var(--primary-color);">Create Account</h2>
    <form method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="role">Register As</label>
            <select id="role" name="role" class="form-control">
                <option value="user">Resident / Member</option>
                <option value="admin">Administrator</option>
            </select>
        </div>
        <button type="submit" class="btn btn-full">Register</button>
    </form>
    <p style="margin-top: 1.5rem; text-align: center; color: var(--text-muted);">
        Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary-color);">Login</a>
    </p>
</div>
{% endblock %}
